services:
  - type: web
    name: 12-tribes-api
    runtime: node
    region: oregon
    # plan intentionally omitted — uses whatever is set in the Render dashboard.
    # Previously had plan: starter which was overriding and capping resources.
    buildCommand: npm install --production
    startCommand: node --max-old-space-size=6144 --expose-gc server/standalone.js
    # Health check: Render waits for /api/health to return 200 before marking
    # the new deploy live. This prevents traffic hitting a half-booted instance.
    # Timeout raised to 300s (5 min) — gives PG cold-start + table load time.
    healthCheckPath: /api/health
    healthCheckTimeout: 300
    autoDeploy: true
    disk:
      name: tribes-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://12-tribes-platform.vercel.app
      - key: DATA_DIR
        value: /data
      - key: MARKET_DATA_MODE
        value: hybrid
      - key: NODE_ENV
        value: production
      # ── SECRET / SENSITIVE VARS — set value in Render dashboard, NOT here ──
      # DATABASE_URL    — set in Render dashboard (PostgreSQL internal connection string)
      # ADMIN_EMAIL     — set in Render dashboard (e.g. abose.ctc@gmail.com)
      #                   Required: prevents first-registered user from becoming admin
