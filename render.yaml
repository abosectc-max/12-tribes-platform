services:
  - type: web
    name: 12-tribes-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install --production
    startCommand: node --max-old-space-size=384 --expose-gc server/standalone.js
    disk:
      name: tribes-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://12-tribes-platform.vercel.app
      - key: DATA_DIR
        value: /data
      - key: MARKET_DATA_MODE
        value: hybrid
