services:
  - type: web
    name: 12-tribes-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: npm install --production
    startCommand: node --max-old-space-size=384 --expose-gc server/standalone.js
    # Health check: Render waits for this path to return 200 before marking deploy complete.
    # Prevents "old build" window — traffic only routes to new instance once it's truly ready.
    healthCheckPath: /api/health
    # Auto-deploy on every push to main
    autoDeploy: true
    disk:
      name: tribes-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://12-tribes-platform.vercel.app
      - key: DATA_DIR
        value: /data
      - key: MARKET_DATA_MODE
        value: hybrid
      - key: NODE_ENV
        value: production
      # Set to your Render service URL to enable keep-alive self-ping (prevents spin-down)
      - key: KEEP_ALIVE_URL
        value: https://one2-tribes-api.onrender.com
