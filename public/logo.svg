<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Blue to green gradient for the globe mesh -->
    <linearGradient id="globeGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#4A90D9" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#3AAFA9" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#2ECC71" stop-opacity="0.8"/>
    </linearGradient>
    <!-- Gold gradient for the 12 -->
    <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7DC6F"/>
      <stop offset="30%" stop-color="#D4AC0D"/>
      <stop offset="60%" stop-color="#F1C40F"/>
      <stop offset="100%" stop-color="#D4AC0D"/>
    </linearGradient>
    <!-- Arrow gold gradient -->
    <linearGradient id="arrowGold" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#D4AC0D"/>
      <stop offset="100%" stop-color="#F7DC6F"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="circleClip">
      <circle cx="200" cy="185" r="130"/>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="#0B1A3B" rx="40"/>

  <!-- Outer ring glow -->
  <circle cx="200" cy="185" r="134" fill="none" stroke="rgba(74,144,217,0.15)" stroke-width="4"/>
  <circle cx="200" cy="185" r="130" fill="none" stroke="rgba(74,144,217,0.3)" stroke-width="1.5"/>

  <!-- Globe geometric mesh (clipped to circle) -->
  <g clip-path="url(#circleClip)" opacity="0.85">
    <!-- Background fill -->
    <circle cx="200" cy="185" r="130" fill="#0D2247"/>

    <!-- Triangular mesh pattern - top section (blue) -->
    <!-- Row 1 - top -->
    <polygon points="200,58 170,95 230,95" fill="none" stroke="#4A90D9" stroke-width="1.2" opacity="0.7"/>
    <polygon points="170,95 140,130 200,130" fill="none" stroke="#4A90D9" stroke-width="1.2" opacity="0.65"/>
    <polygon points="170,95 200,130 200,58" fill="none" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <polygon points="230,95 200,130 260,130" fill="none" stroke="#4A90D9" stroke-width="1.2" opacity="0.65"/>
    <polygon points="230,95 200,58 260,95" fill="none" stroke="#4A90D9" stroke-width="1" opacity="0.5"/>
    <polygon points="260,95 260,130 290,110" fill="none" stroke="#4A90D9" stroke-width="1" opacity="0.45"/>

    <!-- Row 2 - upper mid -->
    <polygon points="110,130 140,130 125,165" fill="none" stroke="#4A9FBF" stroke-width="1.2" opacity="0.6"/>
    <polygon points="140,130 170,165 125,165" fill="none" stroke="#4A9FBF" stroke-width="1.1" opacity="0.55"/>
    <polygon points="260,130 290,165 260,165" fill="none" stroke="#4A9FBF" stroke-width="1.1" opacity="0.55"/>
    <polygon points="260,130 300,130 290,165" fill="none" stroke="#4A9FBF" stroke-width="1" opacity="0.45"/>

    <!-- Row 3 - middle (transition zone) -->
    <polygon points="90,165 125,165 110,200" fill="none" stroke="#3AAFA9" stroke-width="1.2" opacity="0.6"/>
    <polygon points="125,165 155,200 110,200" fill="none" stroke="#3AAFA9" stroke-width="1.1" opacity="0.55"/>
    <polygon points="290,165 310,200 275,200" fill="none" stroke="#3AAFA9" stroke-width="1.1" opacity="0.55"/>
    <polygon points="260,165 290,165 275,200" fill="none" stroke="#3AAFA9" stroke-width="1.1" opacity="0.5"/>

    <!-- Row 4 - lower mid (green transition) -->
    <polygon points="85,200 110,200 100,235" fill="none" stroke="#35B87A" stroke-width="1.2" opacity="0.6"/>
    <polygon points="110,200 140,235 100,235" fill="none" stroke="#35B87A" stroke-width="1.1" opacity="0.55"/>
    <polygon points="140,235 170,200 155,200" fill="none" stroke="#35B87A" stroke-width="1" opacity="0.5"/>
    <polygon points="275,200 305,200 290,235" fill="none" stroke="#35B87A" stroke-width="1.1" opacity="0.55"/>
    <polygon points="245,200 275,200 260,235" fill="none" stroke="#35B87A" stroke-width="1.1" opacity="0.5"/>

    <!-- Row 5 - lower (green) -->
    <polygon points="100,235 130,270 100,270" fill="none" stroke="#2ECC71" stroke-width="1.2" opacity="0.6"/>
    <polygon points="130,270 160,235 140,235" fill="none" stroke="#2ECC71" stroke-width="1.1" opacity="0.55"/>
    <polygon points="160,235 170,270 130,270" fill="none" stroke="#2ECC71" stroke-width="1" opacity="0.5"/>
    <polygon points="260,235 290,235 275,270" fill="none" stroke="#2ECC71" stroke-width="1.1" opacity="0.55"/>
    <polygon points="230,235 260,235 245,270" fill="none" stroke="#2ECC71" stroke-width="1.1" opacity="0.5"/>
    <polygon points="245,270 275,270 260,300" fill="none" stroke="#2ECC71" stroke-width="1" opacity="0.45"/>

    <!-- Row 6 - bottom -->
    <polygon points="130,270 170,270 150,300" fill="none" stroke="#27AE60" stroke-width="1" opacity="0.5"/>
    <polygon points="170,270 200,300 150,300" fill="none" stroke="#27AE60" stroke-width="1" opacity="0.45"/>
    <polygon points="200,300 230,270 245,270" fill="none" stroke="#27AE60" stroke-width="1" opacity="0.45"/>
    <polygon points="200,300 245,270 230,310" fill="none" stroke="#27AE60" stroke-width="0.8" opacity="0.35"/>

    <!-- Filled accent triangles for depth -->
    <polygon points="230,95 260,95 245,70" fill="#4A90D9" opacity="0.15"/>
    <polygon points="140,130 170,95 125,95" fill="#4A90D9" opacity="0.12"/>
    <polygon points="260,165 290,165 275,140" fill="#3AAFA9" opacity="0.12"/>
    <polygon points="100,235 130,235 115,210" fill="#35B87A" opacity="0.12"/>
    <polygon points="245,270 275,270 260,245" fill="#2ECC71" opacity="0.12"/>

    <!-- Gold accent triangles (arrows/compass indicators) -->
    <polygon points="200,58 190,80 210,80" fill="url(#arrowGold)" opacity="0.85"/>
    <polygon points="200,55 185,85 215,85" fill="none" stroke="#D4AC0D" stroke-width="1.5" opacity="0.6"/>

    <!-- Upper right arrow -->
    <polygon points="280,100 270,80 290,85" fill="url(#arrowGold)" opacity="0.7"/>
    <line x1="275" y1="90" x2="295" y2="70" stroke="#D4AC0D" stroke-width="1.8" opacity="0.6"/>
    <polygon points="295,70 285,72 293,80" fill="#D4AC0D" opacity="0.7"/>

    <!-- Upper left growth arrow -->
    <line x1="130" y1="95" x2="115" y2="70" stroke="#D4AC0D" stroke-width="1.5" opacity="0.5"/>
    <polygon points="115,70 120,80 110,78" fill="#D4AC0D" opacity="0.6"/>

    <!-- Lower right small arrow -->
    <polygon points="310,190 300,175 315,180" fill="url(#arrowGold)" opacity="0.5"/>
  </g>

  <!-- Gold "12" text - centered -->
  <text x="200" y="210" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="105" font-weight="900" fill="url(#goldGrad)" filter="url(#glow)"
        letter-spacing="-4">12</text>

  <!-- Brand text below globe -->
  <text x="200" y="350" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="32" font-weight="800" fill="url(#goldGrad)" letter-spacing="6">12 TRIBES</text>
  <text x="200" y="378" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="600" fill="#7BA3CC" letter-spacing="4">AI INVESTMENT GROUP</text>
</svg>
