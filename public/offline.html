<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a1a" />
  <title>12 Tribes — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center; flex-direction: column;
      background: linear-gradient(160deg, #0a0a1a 0%, #0d1117 30%, #0a0f1e 60%, #111827 100%);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
      color: #fff;
      padding: 24px;
      text-align: center;
    }
    .glow {
      position: fixed; top: -200px; right: -200px; width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(0,212,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .card {
      background: rgba(255,255,255,0.07);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 24px;
      padding: 48px 40px;
      max-width: 420px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.25);
    }
    .logo {
      width: 64px; height: 64px; border-radius: 20px; margin: 0 auto 24px;
      background: linear-gradient(135deg, #00D4FF, #A855F7);
      display: flex; align-items: center; justify-content: center;
      font-size: 24px; font-weight: 900;
      box-shadow: 0 4px 24px rgba(0,212,255,0.3);
      opacity: 0.6;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; letter-spacing: 1px; }
    p { font-size: 14px; color: rgba(255,255,255,0.5); line-height: 1.6; margin-bottom: 24px; }
    .btn {
      padding: 14px 32px; border-radius: 16px; border: none; cursor: pointer;
      background: linear-gradient(135deg, rgba(0,212,255,0.2), rgba(168,85,247,0.2));
      color: #00D4FF; font-size: 14px; font-weight: 600;
      transition: all 0.2s;
    }
    .btn:active { transform: scale(0.97); }
    .status { margin-top: 20px; font-size: 11px; color: rgba(255,255,255,0.2); }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="card">
    <div class="logo">12</div>
    <h1>You're Offline</h1>
    <p>12 Tribes requires a network connection to fetch live market data and sync your portfolio. Please check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    <div class="status">12 TRIBES v1.0 — Offline Mode</div>
  </div>
</body>
</html>
