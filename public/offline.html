<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0a0a1a">
  <title>12 Tribes | Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      background: #0a0a1a;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      padding-top: calc(24px + env(safe-area-inset-top));
      padding-bottom: calc(24px + env(safe-area-inset-bottom));
    }
    .container { text-align: center; max-width: 380px; }
    .logo {
      width: 80px; height: 80px; border-radius: 22px;
      background: linear-gradient(135deg, #00D4FF, #A855F7);
      display: flex; align-items: center; justify-content: center;
      font-size: 28px; font-weight: 900; color: #fff;
      margin: 0 auto 32px;
      box-shadow: 0 8px 32px rgba(0,212,255,0.25);
    }
    h1 {
      font-size: 22px; font-weight: 700; margin-bottom: 12px;
      background: linear-gradient(135deg, #fff, rgba(255,255,255,0.7));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    p { font-size: 14px; color: rgba(255,255,255,0.45); line-height: 1.6; margin-bottom: 32px; }
    .btn {
      display: inline-block; padding: 14px 32px; border-radius: 14px;
      background: linear-gradient(135deg, #00D4FF, #A855F7);
      color: #fff; font-size: 14px; font-weight: 700;
      border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,212,255,0.3);
    }
    .btn:active { transform: scale(0.97); }
    .status { margin-top: 24px; font-size: 11px; color: rgba(255,255,255,0.25); letter-spacing: 1px; text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">12</div>
    <h1>You're Offline</h1>
    <p>12 Tribes requires an internet connection to sync your portfolio and market data. Check your connection and try again.</p>
    <button class="btn" onclick="window.location.reload()">Retry Connection</button>
    <div class="status">12 Tribes v2.0</div>
  </div>
</body>
</html>
